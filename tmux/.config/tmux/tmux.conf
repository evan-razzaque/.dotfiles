# --------------------------------------------------
# Server Options
# --------------------------------------------------

# Enable hyperlinks
set -as terminal-features ",*:hyperlinks"

# --------------------------------------------------
# Global Options
# --------------------------------------------------

# Resizing
set -g window-size latest

# Prefix
set -g prefix C-a
bind C-a send-prefix

# Mouse support
set -g mouse on

# Start index at 1, not 0
set -g base-index 1
set -g pane-base-index 1

# Renumber windows when a window is closed
set -g renumber-windows on

# Add a bit more scroll history in the buffer.
set -g history-limit 50000

# Enable color support inside of tmux.
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Status bar
set -g status-left-length 20
set -g status-style bg=default
set -g status-right-length 100
set -g window-status-current-style bg=white,fg=black

set -g status-right \
"#{pane_id} | #{user}@#{host} | #(date +'%H:%M %F') | \
vpn: #(~/.config/tmux/scripts/vpn-status)"

# --------------------------------------------------
# Keybindings
# --------------------------------------------------

%hidden tmux_path="~/.config/tmux"

# Unbind default keys
unbind C-b
unbind Down
unbind Up
unbind Right
unbind Left
unbind [
unbind l

# Reload the tmux config.
bind-key r source-file ${tmux_path}/tmux.conf

# New window in current working directory
bind-key c new-window -c "#{pane_current_path}"

# Select pane
bind-key C-j select-pane -D
bind-key C-k select-pane -U
bind-key C-l select-pane -R
bind-key C-h select-pane -L

# Display panes
bind-key q display-panes -d 0

# Split pane
bind-key j split-window -c "#{pane_current_path}"
bind-key k split-window -c "#{pane_current_path}" -b
bind-key l split-window -c "#{pane_current_path}" -h
bind-key h split-window -c "#{pane_current_path}" -hb

# Resize pane
bind-key -r M-j resize-pane -D
bind-key -r M-k resize-pane -U
bind-key -r M-l resize-pane -R
bind-key -r M-h resize-pane -L

bind-key -r M-J resize-pane -D 5
bind-key -r M-K resize-pane -U 5
bind-key -r M-L resize-pane -R 5
bind-key -r M-H resize-pane -L 5

# Change pane working directory to session path
bind-key C-r respawn-pane -k

# Spread panes evenly
bind-key e select-layout -E

# Copy mode
bind-key v copy-mode -H
bind-key -T copy-mode-vi 'v' send -X rectangle-off \; send -X begin-selection
bind-key -T copy-mode-vi 'C-v' send -X rectangle-on \; send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

# These files are optional
source-file -q ${tmux_path}/vim-tmux-navigator.tmux

# User-defined config
source-file -q ${tmux_path}/tmux-user.conf

# --------------------------------------------------
# Plugin Manager
# --------------------------------------------------

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'MunifTanjim/tmux-suspend'

# tmux-yank
set -g @yank_action 'copy-pipe'

# tmux-suspend
set -g @suspend_key 'C-\'
set -g @suspend_suspended_options " \
   status::off, \
"

# Suspend nested tmux sessions on startup
if -F "#{||:#{TMUX},#{SSH_CLIENT}}" {
   display foo

   if -F "#{!:#{@tmux_nested}}" {
      set -g @tmux_nested 1
      run -b "$tmux_path/plugins/tmux-suspend/scripts/suspend.sh\
         '#{@suspend_on_suspend_command}' '#{@suspend_suspended_options}'"
   }
} {
   # Don't send keys from nested sessions on suspend/resume
   set -g @suspend_on_suspend_command "tmux send -F #{@suspend_key}\\"
   set -g @suspend_on_resume_command "tmux send -F #{@suspend_key}\\"
}

# Install tpm if not found
if "test ! -d ~/.config/tmux/plugins/tpm" {
   run "git clone https://github.com/tmux-plugins/tpm ${tmux_path}/plugins/tpm \
      && ${tmux_path}/plugins/tpm/bin/install_plugins"
}

# Initialize TPM
run -b "${tmux_path}/plugins/tpm/tpm"
