If:
  PathMatch: [.*\.c]
CompileFlags:
  Add: [-xc-header]

---

CompileFlags:
  Add: [-Wall, -Werror, -Werror=vla, -Ustdin, -Ustdout, -Ustderr, -ferror-limit=0]
Completion:
  AllScopes: No
  ArgumentLists: None
  HeaderInsertion: Never
  CodePatterns: None
InlayHints:
  Enabled: false
Hover:
  ShowAKA: true
Diagnostics:
  UnusedIncludes: None
